schema_version: 1

context:
  version: "0.2.1"  # set to match your git tag

package:
  name: octron
  version: ${{ version }}

source:
  - url: https://github.com/OCTRON-tracking/OCTRON-GUI/archive/refs/tags/v${{ version }}.tar.gz
    sha256: 32d123232ecbb6aeb6a01f9b9cbbded635625216beb0b24f5cc367c515a7ee9a
  - path: menu
    target_directory: menu

build:
  number: 0
  noarch: python
  script:
    - export SETUPTOOLS_SCM_PRETEND_VERSION=${{ version }}  # [unix]
    - set SETUPTOOLS_SCM_PRETEND_VERSION=${{ version }}     # [win]
    - python -m pip install . -vv --no-deps --no-build-isolation
    # noarch:python builds once on Linux; the Menu files ship in the package and
    # menuinst consumes them per-platform at install time.
    - mkdir -p $PREFIX/Menu
    - cp menu/menu.json $PREFIX/Menu/octron.json
    - cp menu/octron.ico menu/octron.icns menu/octron.png $PREFIX/Menu/
  python:
    entry_points:
      - octron-gui = octron.main:octron_gui
      - octron-gif = octron.tools.mp4_to_gif:main
      - octron-test-gpu = octron.test_gpu:check_gpu_access

requirements:
  host:
    - python =3.11
    - pip
    - setuptools >=62.3.0,<75.8.1
    - wheel
    - setuptools_scm >=6.3
  run:
    - python =3.11
    - menuinst >=2          # creates the desktop/start-menu launcher on install
    - ffmpeg >=8.0
    - napari >=0.7.1
    - numpy >=2.1.0
    - qtpy >=2.4.3
    - pyqt6
    - pytorch >=2.5.1
    - torchvision >=0.20.1
    - tqdm >=4.67.1
    - scipy >=1.15.1
    - pandas >=2.2.3
    - scikit-image >=0.25.0
    - tifffile
    - zarr ==3.1.6    # newer versions require a python version bump
    - kornia >=0.8.0
    - cmasher >=1.9.2
    - imantics
    - ultralytics >=8.4.46
    - setuptools
    - tensorboard >=2.19.0
    - lap >=0.5.12
    - py-opencv >=4.11.0
    - natsort >=8.4.0
    - loguru >=0.7
    - platformdirs >=4.0
    - typer >=0.12.0
    - huggingface_hub >=1.5.0
    - transformers >=5.2.0
    - timm >=1.0.25
    - napari-pyav-octron    # your channel
    - sam2-octron           # your channel
    - boxmot-octron         # your channel
    - clip-octron           # your channel

tests:
  - script:
      - python -c "import octron"
    requirements:
      run:
        - pyqt6

about:
  homepage: https://github.com/OCTRON-tracking/OCTRON-GUI
  summary: "OCTRON - segmentation and tracking for animal behavior quantification"
  license: GPL-3.0-or-later
  license_file: LICENSE

extra:
  recipe-maintainers:
    - roaldarbol
    - horsto