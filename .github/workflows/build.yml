on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build (${{ matrix.recipe }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - recipe: sam-2
            path: recipes/sam-2
            build_args: "--channel conda-forge"
          - recipe: napari-pyav
            path: recipes/napari-pyav
            build_args: "--channel conda-forge"
          - recipe: boxmot
            path: recipes/boxmot
            build_args: "--channel conda-forge"
          - recipe: clip
            path: recipes/clip
            build_args: "--channel conda-forge"
          - recipe: cotracker
            path: recipes/cotracker
            build_args: "--channel conda-forge"
          - recipe: octron
            path: recipes/octron
            build_args: "--channel https://prefix.dev/octron --channel conda-forge"
      fail-fast: false

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes
        id: changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q "^${{ matrix.path }}/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Build recipe
        if: steps.changes.outputs.changed == 'true'
        uses: prefix-dev/rattler-build-action@v0.2.34
        with:
          recipe-path: recipes/${{ matrix.recipe }}/recipe.yaml
          upload-artifact: true
          artifact-name: package-${{ matrix.recipe }}
          build-args: ${{ matrix.build_args }}
