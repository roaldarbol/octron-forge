# .github/workflows/build-and-upload.yml
name: Build and upload

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build and upload (${{ matrix.recipe }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        recipe:
          - sam-2
          - napari-pyav
          - boxmot
      fail-fast: false

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Build recipe
        uses: prefix-dev/rattler-build-action@v0.2.36
        with:
          recipe-path: recipes/${{ matrix.recipe }}/recipe.yaml
          upload-artifact: true
          artifact-name: package-${{ matrix.recipe }}

      - name: Upload to Prefix
        run: |
          for pkg in $(find output -type f \( -name "*.conda" -o -name "*.tar.bz2" \)); do
            echo "Uploading ${pkg}"
            rattler-build upload prefix -c octron "${pkg}"
          done