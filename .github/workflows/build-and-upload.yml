on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build and upload (${{ matrix.recipe }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - recipe: sam-2
            path: recipes/sam-2/**
          - recipe: napari-pyav
            path: recipes/napari-pyav/**
          - recipe: boxmot
            path: recipes/boxmot/**
          - recipe: clip
            path: recipes/clip/**
          - recipe: octron
            path: recipes/octron/**
      fail-fast: false

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^${{ matrix.path }}"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Build recipe
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: prefix-dev/rattler-build-action@v0.2.34
        with:
          recipe-path: recipes/${{ matrix.recipe }}/recipe.yaml
          upload-artifact: true
          artifact-name: package-${{ matrix.recipe }}

      - name: Upload to Prefix
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          for pkg in $(find output -type f \( -name "*.conda" -o -name "*.tar.bz2" \)); do
            echo "Uploading ${pkg}"
            rattler-build upload prefix -c octron "${pkg}"
          done